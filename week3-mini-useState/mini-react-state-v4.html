<!DOCTYPE html>
<html>
<body>
  <div id="root">

  </div>

  <script>
    const root = document.getElementById('root')

    function createElement(type, props, ...children) {
      return { 
        type, 
        props: { ...props } || {},
        children: children.flat()
      }
    }

    function renderToDom(vdom) {
      if (typeof vdom === 'string' || typeof vdom === 'number') {
        return document.createTextNode(vdom)
      }

      const dom = document.createElement(vdom.type)

      vdom.props && Object.entries(vdom.props).forEach(([key, value]) => {
        if (key.startsWith('on')) {
          const eventType = key.slice(2).toLowerCase()
          dom.addEventListener(eventType, value)
        } else {
          dom.setAttribute(key, value)
        }
      })

      vdom.children.forEach(child => dom.appendChild(renderToDom(child)))

      return dom
    }

    let state;
    let hooks = []
    let currentHook = 0
    let queue = []
    let isRendering = false

    function scheduleRender(){
        if (!isRendering) {
            isRendering = true
            Promise.resolve().then(() =>{
                queue.forEach(fn => fn())
                queue = []
                render()
                isRendering = false
            })
        }
    }

    function useState(initialValue) {
        const hookIndex = currentHook
        hooks[hookIndex] = hooks[hookIndex] || initialValue
        const setState = newValue => {
            console.log('setState called with', newValue)
            queue.push(() => {
                console.log('Updating state at hook index', hookIndex)
                hooks[hookIndex] = typeof newValue === 'function' ? newValue(hooks[hookIndex]) : newValue
            })
            scheduleRender()
        }
        currentHook++
        return [hooks[hookIndex], setState]

    }

    function App() {
        const [count, setCount] = useState(0)
        const [name, setName] = useState('Tom')

        return createElement('div', null, 
            createElement('h1', null, `Count: ${count}`),
            createElement('button', { onClick: () => setCount(count + 1) }, 'Increment Count'),
            createElement('h2', null, `Name: ${name}`),
            createElement('button', { onClick: () => setName(name === 'Tom' ? 'Jerry' : 'Tom') }, 'Toggle Name')
        )
    }

    let app;

    function render() {
        currentHook = 0
        const vdom = App()
        root.innerHTML = ''
        root.appendChild(renderToDom(vdom))
    }

    render()

  </script>
</body>
</html>
